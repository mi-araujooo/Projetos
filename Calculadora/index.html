<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <meta name="description" content="Calculadora de básica">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="espaco-geral">
        <div class="pop-up"></div>
        <div class="calculadora">
            <div class="visor" id="visor">0</div>
            <div class="teclado">
                <button class="funcoes" data-valor="mmais">M+</button>
                <button class="funcoes" data-valor="mmenos">M-</button>
                <button class="funcoes" data-valor="mr">MR</button>
                <button class="funcoes" data-valor="mc">MC</button>
                <button class="funcoes" data-valor="ac"> AC</button>
                

                <button class="numeros" data-valor= 1 >1</button>
                <button class="numeros" data-valor= 2>2</button>
                <button class="numeros" data-valor= 3 >3</button>

                <button class="operador" data-valor="+">+</button>
                <button class="operador" data-valor="-">-</button>

                <button class="numeros" data-valor= 4 >4</button>
                <button class="numeros" data-valor= 5>5</button>
                <button class="numeros" data-valor= 6>6</button>

                <button class="operador" data-valor="x">x</button>
                <button class="operador" data-valor="÷">÷</button>

                <button class="numeros" data-valor= 7>7</button>
                <button class="numeros" data-valor= 8>8</button>
                <button class="numeros" data-valor= 9>9</button>

                <button class="operador" data-valor="%">%</button>
                <button class="operador" data-valor="^">^</button>
                <button class="funcoes" data-valor="+/-">+/-</button>

                <button class="numeros" data-valor= 0>0</button>
                <button class="numeros" data-valor=".">.</button>

                <button class="funcoes" data-valor="gt">GT</button>
                <button class="igual">=</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
